// ─── IndexedDB Persistence ─────────────────────────────────────────
const DB_NAME = "EchoVaultDB";
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("conversations")) db.createObjectStore("conversations", { keyPath: "id" });
      if (!db.objectStoreNames.contains("meta")) db.createObjectStore("meta", { keyPath: "key" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSaveConvs(convs) {
  const db = await openDB();
  const tx = db.transaction("conversations", "readwrite");
  const store = tx.objectStore("conversations");
  store.clear();
  for (const c of convs) {
    store.put({
      ...c,
      createTime: c.createTime ? c.createTime.toISOString() : null,
      messages: c.messages.map(m => ({ ...m, time: m.time ? m.time.toISOString() : null })),
    });
  }
  return new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = () => reject(tx.error); });
}

async function idbLoadConvs() {
  const db = await openDB();
  const tx = db.transaction("conversations", "readonly");
  const store = tx.objectStore("conversations");
  return new Promise((resolve, reject) => {
    const req = store.getAll();
    req.onsuccess = () => {
      const convs = req.result.map(c => ({
        ...c,
        createTime: c.createTime ? new Date(c.createTime) : null,
        messages: c.messages.map(m => ({ ...m, time: m.time ? new Date(m.time) : null })),
      }));
      resolve(convs);
    };
    req.onerror = () => reject(req.error);
  });
}

async function idbSaveMeta(key, value) {
  const db = await openDB();
  const tx = db.transaction("meta", "readwrite");
  tx.objectStore("meta").put({ key, value });
  return new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = () => reject(tx.error); });
}

async function idbLoadMeta(key) {
  const db = await openDB();
  const tx = db.transaction("meta", "readonly");
  return new Promise((resolve, reject) => {
    const req = tx.objectStore("meta").get(key);
    req.onsuccess = () => resolve(req.result?.value ?? null);
    req.onerror = () => reject(req.error);
  });
}

function categorize(messages) {
  const text = messages.map(m => m.text).join(" ");
  const textLen = text.length;
  const scores = {};
  for (const [cat, { keys }] of Object.entries(CATS)) {
    if (keys.length === 0) continue;
    let score = 0;
    for (const [keyword, weight] of keys) {
      const count = text.split(keyword).length - 1;
      score += Math.min(count, 5) * weight;
    }
    const density = textLen > 0 ? score / (textLen / 1000 + 1) : 0;
    scores[cat] = density;
  }
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  if (sorted[0] && sorted[0][1] >= 1.5) return sorted[0][0];
  return "daily";
}

function categorizeMsg(text) {
  const scores = {};
  for (const [cat, { keys }] of Object.entries(CATS)) {
    if (keys.length === 0) continue;
    let score = 0;
    for (const [keyword, weight] of keys) {
      const count = text.split(keyword).length - 1;
      score += Math.min(count, 3) * weight;
    }
    scores[cat] = score;
  }
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  if (sorted[0] && sorted[0][1] >= 4) return sorted[0][0];
  return "daily";
}

function parseGPT(data) {
  const arr = Array.isArray(data) ? data : [data];
  const convs = [];
  for (const conv of arr) {
    const mapping = conv.mapping || {};
    const nodes = Object.entries(mapping).reduce((o, [k, v]) => { o[k] = v; return o; }, {});
    let root = null;
    for (const [k, v] of Object.entries(nodes)) { if (!v.parent || !nodes[v.parent]) { root = k; break; } }
    const msgs = [];
    if (root) {
      const q = [root], vis = new Set();
      while (q.length) {
        const n = q.shift(); if (vis.has(n)) continue; vis.add(n);
        const node = nodes[n]; if (!node) continue;
        const m = node.message;
        if (m?.content?.parts && m.author && ["user","assistant"].includes(m.author.role)) {
          const tp = m.content.parts.filter(p => typeof p === "string");
          if (tp.length) msgs.push({ role: m.author.role, text: tp.join("\n"), time: m.create_time ? new Date(m.create_time * 1000) : null, modelSlug: m.metadata?.model_slug || null });
        }
        for (const c of (node.children || [])) if (!vis.has(c)) q.push(c);
      }
    }
    const tc = msgs.reduce((s, m) => s + m.text.length, 0);
    convs.push({
      id: conv.id || conv.conversation_id || Math.random().toString(36).slice(2),
      title: conv.title || "无标题",
      createTime: conv.create_time ? new Date(conv.create_time * 1000) : null,
      messages: msgs, messageCount: msgs.length, totalChars: tc,
      userCount: msgs.filter(m => m.role === "user").length,
      aiCount: msgs.filter(m => m.role === "assistant").length,
      category: categorize(msgs),
      defaultModelSlug: conv.default_model_slug || null,
    });
  }
  return convs;
}

// ─── Markdown Renderer ──────────────────────────────────────────────
function renderInline(text, isUser) {
  // Process inline markdown: **bold**, *italic*, `code`, [link](url)
  const parts = [];
  let remaining = text;
  let ki = 0;
  while (remaining.length > 0) {
    // Code inline: `...`
    const codeMatch = remaining.match(/^`([^`]+)`/);
    if (codeMatch) {
      parts.push(<code key={ki++} style={{
        background: "#f0f0f5", padding: "1px 5px", borderRadius: 4, fontSize: 13,
        fontFamily: "'SF Mono', 'Fira Code', monospace", color: "#e06c75",
      }}>{codeMatch[1]}</code>);
      remaining = remaining.slice(codeMatch[0].length);
      continue;
    }
    // Bold: **...**
    const boldMatch = remaining.match(/^\*\*([^*]+)\*\*/);
    if (boldMatch) {
      parts.push(<strong key={ki++} style={{ color: isUser ? T.pinkDark : T.accentDark }}>{boldMatch[1]}</strong>);
      remaining = remaining.slice(boldMatch[0].length);
      continue;
    }
    // Italic: *...*
    const italicMatch = remaining.match(/^\*([^*]+)\*/);
    if (italicMatch) {
      parts.push(<em key={ki++} style={{ fontStyle: "italic" }}>{italicMatch[1]}</em>);
      remaining = remaining.slice(italicMatch[0].length);
      continue;
    }
    // Link: [text](url)
    const linkMatch = remaining.match(/^\[([^\]]+)\]\(([^)]+)\)/);
    if (linkMatch) {
      parts.push(<a key={ki++} href={linkMatch[2]} target="_blank" rel="noopener noreferrer" style={{
        color: T.accent, textDecoration: "underline",
      }}>{linkMatch[1]}</a>);
      remaining = remaining.slice(linkMatch[0].length);
      continue;
    }
    // Plain char
    const nextSpecial = remaining.slice(1).search(/[`*\[]/);
    if (nextSpecial === -1) {
      parts.push(<span key={ki++}>{remaining}</span>);
      break;
    } else {
      parts.push(<span key={ki++}>{remaining.slice(0, nextSpecial + 1)}</span>);
      remaining = remaining.slice(nextSpecial + 1);
    }
  }
  return parts;
}

function renderMarkdown(text, isUser) {
  const lines = text.split("\n");
  const elements = [];
  let i = 0;
  while (i < lines.length) {
    const l = lines[i];

    // Code block: ```
    if (l.trim().startsWith("```")) {
      const lang = l.trim().slice(3).trim();
      const codeLines = [];
      i++;
      while (i < lines.length && !lines[i].trim().startsWith("```")) {
        codeLines.push(lines[i]);
        i++;
      }
      i++; // skip closing ```
      elements.push(
        <div key={elements.length} style={{ margin: "8px 0" }}>
          {lang && <div style={{ fontSize: 10, color: T.textTer, background: "#2d2d2d", padding: "4px 10px", borderRadius: "8px 8px 0 0", fontFamily: "monospace" }}>{lang}</div>}
          <pre style={{
            background: "#2d2d2d", color: "#f8f8f2", padding: "10px 12px",
            borderRadius: lang ? "0 0 8px 8px" : 8, fontSize: 13, overflowX: "auto",
            fontFamily: "'SF Mono', 'Fira Code', 'Consolas', monospace", lineHeight: 1.6,
            whiteSpace: "pre-wrap", wordBreak: "break-all",
          }}>{codeLines.join("\n")}</pre>
        </div>
      );
      continue;
    }

    // Headings
    if (l.startsWith("### ")) { elements.push(<div key={elements.length} style={{ fontSize: 14, fontWeight: 600, margin: "8px 0 4px", color: T.textSec }}>{renderInline(l.slice(4), isUser)}</div>); i++; continue; }
    if (l.startsWith("## ")) { elements.push(<div key={elements.length} style={{ fontSize: 15, fontWeight: 600, margin: "8px 0 4px", color: T.textSec }}>{renderInline(l.slice(3), isUser)}</div>); i++; continue; }
    if (l.startsWith("# ")) { elements.push(<div key={elements.length} style={{ fontSize: 16, fontWeight: 600, margin: "10px 0 4px" }}>{renderInline(l.slice(2), isUser)}</div>); i++; continue; }

    // Horizontal rule
    if (l.trim() === "---" || l.trim() === "***" || l.trim() === "\u2E3B") { elements.push(<div key={elements.length} style={{ borderTop: `1px solid ${T.borderLight}`, margin: "10px 0" }} />); i++; continue; }

    // Blockquote
    if (l.startsWith("> ")) {
      const quoteLines = [];
      while (i < lines.length && lines[i].startsWith("> ")) {
        quoteLines.push(lines[i].slice(2));
        i++;
      }
      elements.push(
        <div key={elements.length} style={{
          borderLeft: `3px solid ${T.accent}`, paddingLeft: 12, margin: "6px 0",
          color: T.textSec, fontStyle: "italic", lineHeight: 1.8,
        }}>{quoteLines.map((ql, qi) => <div key={qi}>{renderInline(ql, isUser)}</div>)}</div>
      );
      continue;
    }

    // Unordered list: - or *
    if (/^[\-\*]\s/.test(l.trim())) {
      const listItems = [];
      while (i < lines.length && /^[\-\*]\s/.test(lines[i].trim())) {
        listItems.push(lines[i].trim().slice(2));
        i++;
      }
      elements.push(
        <ul key={elements.length} style={{ paddingLeft: 20, margin: "4px 0", lineHeight: 1.85 }}>
          {listItems.map((li, li2) => <li key={li2} style={{ marginBottom: 2 }}>{renderInline(li, isUser)}</li>)}
        </ul>
      );
      continue;
    }

    // Ordered list: 1. 2. etc.
    if (/^\d+[\.\)]\s/.test(l.trim())) {
      const listItems = [];
      while (i < lines.length && /^\d+[\.\)]\s/.test(lines[i].trim())) {
        listItems.push(lines[i].trim().replace(/^\d+[\.\)]\s/, ""));
        i++;
      }
      elements.push(
        <ol key={elements.length} style={{ paddingLeft: 20, margin: "4px 0", lineHeight: 1.85 }}>
          {listItems.map((li, li2) => <li key={li2} style={{ marginBottom: 2 }}>{renderInline(li, isUser)}</li>)}
        </ol>
      );
      continue;
    }

    // Empty line
    if (!l.trim()) { elements.push(<div key={elements.length} style={{ height: 6 }} />); i++; continue; }

    // Normal paragraph
    elements.push(<div key={elements.length} style={{ lineHeight: 1.85 }}>{renderInline(l, isUser)}</div>);
    i++;
  }
  return elements;
}

function Calendar({ selectedDate, onSelect, conversations }) {
  const [viewDate, setViewDate] = useState(() => {
    if (selectedDate) return selectedDate;
    // Default to the month of the most recent conversation
    const withDates = conversations.filter(c => c.createTime).sort((a, b) => b.createTime - a.createTime);
    return withDates.length > 0 ? new Date(withDates[0].createTime) : new Date();
  });
  const y = viewDate.getFullYear(), mo = viewDate.getMonth();
  const firstDay = new Date(y, mo, 1).getDay();
  const daysInMonth = new Date(y, mo + 1, 0).getDate();

  const convDates = useMemo(() => {
    const s = new Set();
    conversations.forEach(c => { if (c.createTime) s.add(`${c.createTime.getFullYear()}-${c.createTime.getMonth()}-${c.createTime.getDate()}`); });
    return s;
  }, [conversations]);

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(<div key={`e${i}`} />);
  for (let d = 1; d <= daysInMonth; d++) {
    const hasConv = convDates.has(`${y}-${mo}-${d}`);
    const isSelected = selectedDate && selectedDate.getFullYear() === y && selectedDate.getMonth() === mo && selectedDate.getDate() === d;
    cells.push(
      <div key={d} onClick={(e) => { e.stopPropagation(); if (hasConv) onSelect(new Date(y, mo, d)); }}
        style={{
          width: 32, height: 32, borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 13, cursor: hasConv ? "pointer" : "default",
          background: isSelected ? T.accent : "transparent",
          color: isSelected ? "#fff" : hasConv ? T.text : T.textTer,
          fontWeight: isSelected ? 600 : hasConv ? 500 : 400,
          position: "relative",
        }}>
        {d}
        {hasConv && !isSelected && <div style={{ position: "absolute", bottom: 2, width: 4, height: 4, borderRadius: 2, background: T.accent }} />}
      </div>
    );
  }

  return (
    <div onClick={e => e.stopPropagation()} style={{
      padding: "12px 8px", background: T.surface, borderRadius: 12,
      border: `1px solid ${T.border}`, boxShadow: T.shadowLg,
      position: "relative", zIndex: 100,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, padding: "0 4px" }}>
        <div onClick={(e) => { e.stopPropagation(); setViewDate(new Date(y, mo - 1, 1)); }} style={{ cursor: "pointer", padding: 4, color: T.textSec }}>◀</div>
        <div style={{ fontSize: 14, fontWeight: 500 }}>{y}年{mo + 1}月</div>
        <div onClick={(e) => { e.stopPropagation(); setViewDate(new Date(y, mo + 1, 1)); }} style={{ cursor: "pointer", padding: 4, color: T.textSec }}>▶</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, textAlign: "center" }}>
        {["日","一","二","三","四","五","六"].map(d => <div key={d} style={{ fontSize: 11, color: T.textTer, padding: 4 }}>{d}</div>)}
        {cells}
      </div>
      {selectedDate && <div onClick={(e) => { e.stopPropagation(); onSelect(null); }} style={{ textAlign: "center", fontSize: 12, color: T.accent, marginTop: 8, cursor: "pointer" }}>清除日期筛选</div>}
    </div>
  );
}

function FavoritesView({ conversations, favorites, onToggleFav, onJump }) {
  const favMsgs = useMemo(() => {
    const items = [];
    for (const fk of favorites) {
      // Check if this is a text-selection favorite (format: convId|msgIdx|selectedText)
      if (fk.includes("|")) {
        const parts = fk.split("|");
        const convId = parts[0];
        const idx = parseInt(parts[1]);
        const selectedText = parts.slice(2).join("|");
        const conv = conversations.find(c => c.id === convId);
        if (!conv) continue;
        const msg = conv.messages[idx];
        if (!msg) continue;
        items.push({ key: fk, conv, msg, idx, selectedText });
        continue;
      }
      const [convId, idxStr] = [fk.substring(0, fk.lastIndexOf("-")), fk.substring(fk.lastIndexOf("-") + 1)];
      const conv = conversations.find(c => c.id === convId);
      if (!conv) continue;
      const idx = parseInt(idxStr);
      const msg = conv.messages[idx];
      if (!msg) continue;
      items.push({ key: fk, conv, msg, idx, selectedText: null });
    }
    return items;
  }, [conversations, favorites]);

  if (favMsgs.length === 0) return (
    <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", color: T.textTer }}>
      <div style={{ fontSize: 36, marginBottom: 12 }}>🔔</div>
      <div style={{ fontSize: 14 }}>还没有收藏的语句</div>
      <div style={{ fontSize: 12, marginTop: 6 }}>点击消息 ♡ 收藏整条，或划选文字收藏片段</div>
    </div>
  );

  return (
    <div style={{ flex: 1, overflowY: "auto", padding: 28 }}>
      <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 4 }}>收藏夹</div>
      <div style={{ fontSize: 13, color: T.textSec, marginBottom: 24 }}>那些值得反复回味的语句 · {favMsgs.length}条</div>
      {favMsgs.map(({ key, conv, msg, idx, selectedText }) => (
        <div key={key} style={{
          padding: 16, background: T.surface, borderRadius: 14, marginBottom: 10,
          border: `1px solid ${T.border}`, boxShadow: T.shadow, cursor: "pointer",
          position: "relative",
        }} onClick={() => onJump(conv, idx)}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 11, color: T.textTer }}>
              <span style={{ color: msg.role === "user" ? T.pinkDark : T.accentDark }}>{msg.role === "user" ? "✦ Avenil" : `🐾 ${getModelLabel(msg.modelSlug || conv.defaultModelSlug) ? "纤凝\u00B7" + getModelLabel(msg.modelSlug || conv.defaultModelSlug) : "纤凝"}`}</span>
              <span style={{ margin: "0 8px" }}>·</span>
              <span>{conv.title}</span>
              <span style={{ margin: "0 8px" }}>·</span>
              <span>{msg.time ? fD(msg.time) : ""}</span>
              {selectedText && <span style={{ margin: "0 8px", color: T.accent }}>· 片段</span>}
            </div>
            <div onClick={e => { e.stopPropagation(); onToggleFav(key); }} style={{ cursor: "pointer", fontSize: 14 }}>♥</div>
          </div>
          <div style={{ fontSize: 14, color: T.text, lineHeight: 1.8 }}>
            {selectedText
              ? <span style={{ borderLeft: `3px solid ${T.accent}`, paddingLeft: 10, display: "block", fontStyle: "italic" }}>{selectedText}</span>
              : (msg.text.length > 300 ? msg.text.slice(0, 300) + "..." : msg.text)
            }
          </div>
        </div>
      ))}
    </div>
  );
}

function SelectionTooltip({ onFavSelection }) {
  const [pos, setPos] = useState(null);
  const [text, setText] = useState("");

  useEffect(() => {
    const handleUp = () => {
      setTimeout(() => {
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed || !sel.toString().trim()) {
          setPos(null);
          return;
        }
        const range = sel.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        const selectedText = sel.toString().trim();
        if (selectedText.length < 2) { setPos(null); return; }

        // Check if selection is inside a message bubble
        let node = range.startContainer;
        let bubbleEl = null;
        while (node) {
          if (node.dataset && node.dataset.msgkey) { bubbleEl = node; break; }
          node = node.parentElement;
        }
        if (!bubbleEl) { setPos(null); return; }

        setText(selectedText);
        setPos({
          x: rect.left + rect.width / 2,
          y: rect.top - 8,
          msgKey: bubbleEl.dataset.msgkey,
        });
      }, 10);
    };

    const handleDown = () => {
      // Don't clear immediately — let click on tooltip work
    };

    document.addEventListener("mouseup", handleUp);
    document.addEventListener("touchend", handleUp);
    return () => {
      document.removeEventListener("mouseup", handleUp);
      document.removeEventListener("touchend", handleUp);
    };
  }, []);

  if (!pos) return null;

  return (
    <div style={{
      position: "fixed", left: pos.x, top: pos.y,
      transform: "translate(-50%, -100%)", zIndex: 999,
      background: "#333", color: "#fff", padding: "6px 14px",
      borderRadius: 8, fontSize: 12, cursor: "pointer",
      boxShadow: "0 4px 12px rgba(0,0,0,0.3)",
      whiteSpace: "nowrap", userSelect: "none",
    }} onMouseDown={e => {
      e.preventDefault();
      e.stopPropagation();
      onFavSelection(pos.msgKey, text);
      setPos(null);
      window.getSelection()?.removeAllRanges();
    }}>
      ♥ 收藏选中
      <div style={{
        position: "absolute", bottom: -6, left: "50%", transform: "translateX(-50%)",
        width: 0, height: 0, borderLeft: "6px solid transparent",
        borderRight: "6px solid transparent", borderTop: "6px solid #333",
      }} />
    </div>
  );
}

function MsgBubble({ msg, isFav, onFav, convId, idx, defaultModelSlug }) {
  const isU = msg.role === "user";
  const [exp, setExp] = useState(false);
  const long = msg.text.length > 1200;
  const dt = long && !exp ? msg.text.slice(0, 1200) : msg.text;
  const modelLabel = !isU ? getModelLabel(msg.modelSlug || defaultModelSlug) : null;
  const aiName = modelLabel ? `纤凝\u00B7${modelLabel}` : "纤凝";

  return (
    <div style={{ display: "flex", justifyContent: isU ? "flex-end" : "flex-start", marginBottom: 12, paddingLeft: isU ? 50 : 0, paddingRight: isU ? 0 : 50 }}>
      <div data-msgkey={`${convId}|${idx}`} style={{
        maxWidth: "84%", padding: "10px 14px", position: "relative",
        borderRadius: isU ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
        background: isU ? T.userBubble : T.aiBubble,
        border: `1px solid ${isU ? "#d8ddf5" : T.border}`,
        boxShadow: T.shadow, fontSize: 14, color: T.text,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
          <span style={{ fontSize: 11, color: isU ? T.pinkDark : T.accentDark, fontWeight: 500 }}>
            {isU ? "Avenil" : aiName} <span style={{ fontWeight: 400, color: T.textTer }}>{msg.time ? fT(msg.time) : ""}</span>
          </span>
          <span onClick={e => { e.stopPropagation(); onFav(`${convId}-${idx}`); }}
            style={{ cursor: "pointer", fontSize: 13, opacity: isFav ? 1 : 0.25, transition: "opacity 0.2s" }}>
            {isFav ? "♥" : "♡"}
          </span>
        </div>
        <div>{renderMarkdown(dt, isU)}</div>
        {long && <div onClick={() => setExp(!exp)} style={{
          marginTop: 8, fontSize: 12, color: T.accent, cursor: "pointer", textAlign: "center",
        }}>{exp ? "收起" : `展开 (${fC(msg.text.length)})`}</div>}
      </div>
    </div>
  );
}

function ChatArea({ conv, favorites, onToggleFav, onFavSelection }) {
  const ref = useRef(null);
  const [vc, setVc] = useState(40);
  const [q] = useState(QUOTES[Math.floor(Math.random() * QUOTES.length)]);

  useEffect(() => { setVc(40); if (ref.current) ref.current.scrollTop = 0; }, [conv?.id]);

  const onScroll = useCallback(() => {
    const el = ref.current;
    if (!el || !conv) return;
    if (el.scrollHeight - el.scrollTop - el.clientHeight < 500) setVc(v => Math.min(v + 30, conv.messages.length));
  }, [conv]);

  if (!conv) return (
    <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", color: T.textTer }}>
      <div style={{ fontSize: 28, marginBottom: 12, opacity: 0.4 }}>🕯️</div>
      <div style={{ fontSize: 14, letterSpacing: 1 }}>选择一段对话</div>
      <div style={{ fontSize: 12, marginTop: 8, fontStyle: "italic", opacity: 0.5 }}>"{q}"</div>
    </div>
  );

  const cat = CATS[conv.category] || CATS.daily;

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ padding: "14px 20px", borderBottom: `1px solid ${T.border}`, background: T.surface, flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
          <span style={{ fontSize: 17, fontWeight: 600 }}>{conv.title}</span>
          <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 10, background: cat.color + "18", color: cat.color, fontWeight: 500 }}>
            {cat.label}
          </span>
        </div>
        <div style={{ fontSize: 12, color: T.textTer, display: "flex", gap: 14, flexWrap: "wrap" }}>
          <span>{conv.createTime ? fD(conv.createTime) : ""}</span>
          <span style={{ color: T.pinkDark }}>Avenil {conv.userCount}</span>
          <span style={{ color: T.accentDark }}>纤凝 {conv.aiCount}</span>
          {conv.defaultModelSlug && <span style={{ color: T.textTer }}>{getModelLabel(conv.defaultModelSlug)}</span>}
          <span>{fC(conv.totalChars)}</span>
        </div>
      </div>
      <div ref={ref} onScroll={onScroll} style={{ flex: 1, overflowY: "auto", padding: "16px 20px", background: T.bg, WebkitOverflowScrolling: "touch" }}>
        {conv.messages.slice(0, vc).map((m, i) => (
          <MsgBubble key={i} msg={m} convId={conv.id} idx={i} isFav={favorites.has(`${conv.id}-${i}`)} onFav={onToggleFav} defaultModelSlug={conv.defaultModelSlug} />
        ))}
        {vc < conv.messages.length && <div style={{ textAlign: "center", padding: 16, fontSize: 12, color: T.textTer }}>
          滚动加载更多 ({vc}/{conv.messages.length})
        </div>}
      </div>
    </div>
  );
}

// ─── Main App ───────────────────────────────────────────────────────

function EchoVault() {
  const [convs, setConvs] = useState([]);
  const [sel, setSel] = useState(null);
  const [search, setSearch] = useState("");
  const [loading, setLoading] = useState(true);
  const [incant, setIncant] = useState(true);
  const [favs, setFavs] = useState(new Set());
  const [view, setView] = useState("chat");
  const [showCal, setShowCal] = useState(false);
  const [dateFilter, setDateFilter] = useState(null);
  const [catFilter, setCatFilter] = useState(null);
  const [platform, setPlatform] = useState("GPT");
  const [showSidebar, setShowSidebar] = useState(true);
  const inputRef = useRef(null);
  const [isMobile, setIsMobile] = useState(false);

  // Responsive detection
  useEffect(() => {
    const check = () => setIsMobile(window.innerWidth < 768);
    check();
    window.addEventListener("resize", check);
    return () => window.removeEventListener("resize", check);
  }, []);

  // Load from IndexedDB on mount
  useEffect(() => {
    (async () => {
      try {
        const [savedConvs, savedFavs] = await Promise.all([idbLoadConvs(), idbLoadMeta("favorites")]);
        if (savedConvs.length > 0) setConvs(savedConvs);
        if (savedFavs) setFavs(new Set(savedFavs));
      } catch (e) { console.error("IDB load error:", e); }
      setLoading(false);
    })();
  }, []);

  // Save conversations to IndexedDB when they change
  const convsRef = useRef(convs);
  useEffect(() => {
    convsRef.current = convs;
    if (convs.length > 0) idbSaveConvs(convs).catch(e => console.error("IDB save convs error:", e));
  }, [convs]);

  // Save favorites to IndexedDB when they change
  useEffect(() => {
    if (favs.size > 0 || convsRef.current.length > 0) {
      idbSaveMeta("favorites", [...favs]).catch(e => console.error("IDB save favs error:", e));
    }
  }, [favs]);

  const toggleFav = useCallback(id => {
    setFavs(p => { const n = new Set(p); if (n.has(id)) n.delete(id); else n.add(id); return n; });
  }, []);

  // Handle selection-based favorites
  const handleFavSelection = useCallback((msgKey, selectedText) => {
    // msgKey format: "convId|msgIdx"
    const favKey = `${msgKey}|${selectedText}`;
    setFavs(p => { const n = new Set(p); n.add(favKey); return n; });
  }, []);

  const filtered = useMemo(() => {
    let list = convs;
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(c => c.title.toLowerCase().includes(q) || c.messages.some(m => m.text.toLowerCase().includes(q)));
    }
    if (dateFilter) {
      list = list.filter(c => c.createTime &&
        c.createTime.getFullYear() === dateFilter.getFullYear() &&
        c.createTime.getMonth() === dateFilter.getMonth() &&
        c.createTime.getDate() === dateFilter.getDate()
      );
    }
    if (catFilter) list = list.filter(c => c.category === catFilter);
    return list;
  }, [convs, search, dateFilter, catFilter]);

  const grouped = useMemo(() => {
    const g = {};
    for (const c of filtered) {
      const k = c.createTime ? `${c.createTime.getFullYear()}年${c.createTime.getMonth() + 1}月` : "未知";
      if (!g[k]) g[k] = [];
      g[k].push(c);
    }
    return g;
  }, [filtered]);

  const handleFiles = async (files) => {
    setLoading(true);
    const all = [...convs];
    const ids = new Set(all.map(c => c.id));
    for (const f of files) {
      try {
        const t = await f.text();
        const j = JSON.parse(t);
        for (const c of parseGPT(j)) {
          c.platform = platform;
          if (!ids.has(c.id)) { all.push(c); ids.add(c.id); }
        }
      } catch (e) { console.error(e); }
    }
    all.sort((a, b) => (b.createTime?.getTime() || 0) - (a.createTime?.getTime() || 0));
    setConvs(all);
    setLoading(false);
  };

  const jumpTo = (conv, msgIdx) => {
    setSel(conv);
    setView("chat");
    if (isMobile) setShowSidebar(false);
  };

  if (incant) return <Incantation onDone={() => setIncant(false)} />;

  if (loading) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: T.bg, fontFamily: FONT }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ width: 24, height: 24, border: `2px solid ${T.border}`, borderTopColor: T.accent, borderRadius: "50%", animation: "spin 0.8s linear infinite", margin: "0 auto 12px" }} />
        <div style={{ fontSize: 13, color: T.textSec }}>加载中...</div>
      </div>
    </div>
  );

  if (convs.length === 0) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: T.bg, fontFamily: FONT }}>
      <div style={{ textAlign: "center", maxWidth: 420, padding: 32 }}>
        <div style={{ fontSize: 11, letterSpacing: 6, color: T.textTer, marginBottom: 12 }}>ECHOVAULT</div>
        <div style={{ fontSize: 24, fontWeight: 300, letterSpacing: 3, marginBottom: 8 }}>语言巢</div>
        <div style={{ fontSize: 12, color: T.textTer, marginBottom: 32, fontStyle: "italic" }}>
          "{QUOTES[Math.floor(Math.random() * QUOTES.length)]}"
        </div>
        <div style={{ marginBottom: 16, display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
          {["GPT", "Claude", "Kimi", "其他"].map(p => (
            <div key={p} onClick={() => setPlatform(p)} style={{
              padding: "6px 16px", borderRadius: 20, fontSize: 13, cursor: "pointer",
              background: platform === p ? T.accent : T.surface, color: platform === p ? "#fff" : T.textSec,
              border: `1px solid ${platform === p ? T.accent : T.border}`, transition: "all 0.2s",
            }}>{p}</div>
          ))}
        </div>
        <div onClick={() => inputRef.current?.click()} style={{
          padding: "40px 32px", border: `2px dashed ${T.border}`, borderRadius: 20, cursor: "pointer",
          background: T.surface, transition: "all 0.3s",
        }}>
          <div style={{ fontSize: 28, marginBottom: 8, opacity: 0.4 }}>📂</div>
          <div style={{ fontSize: 14, color: T.textSec }}>点击导入 {platform} 对话文件</div>
          <div style={{ fontSize: 12, color: T.textTer, marginTop: 4 }}>支持 JSON 格式，可多选</div>
        </div>
        <input ref={inputRef} type="file" accept=".json" multiple style={{ display: "none" }}
          onChange={e => { const f = Array.from(e.target.files || []); if (f.length) handleFiles(f); }} />
      </div>
    </div>
  );

  const sidebar = (
    <div style={{
      width: isMobile ? "100%" : 300, minWidth: isMobile ? "auto" : 300,
      height: "100vh", background: T.surface, borderRight: isMobile ? "none" : `1px solid ${T.border}`,
      display: "flex", flexDirection: "column", overflow: "hidden",
      position: isMobile ? "fixed" : "relative", left: 0, top: 0, zIndex: 50,
      boxShadow: isMobile ? T.shadowLg : "none",
    }}>
      <div style={{ padding: "16px 14px 8px", flexShrink: 0 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: 4, color: T.textTer }}>ECHOVAULT</div>
            <div style={{ fontSize: 16, fontWeight: 600 }}>语言巢</div>
          </div>
          {isMobile && <div onClick={() => setShowSidebar(false)} style={{ fontSize: 18, cursor: "pointer", color: T.textSec, padding: 4 }}>✕</div>}
        </div>
        <input type="text" placeholder="搜索对话或消息内容..." value={search} onChange={e => setSearch(e.target.value)}
          style={{
            width: "100%", padding: "8px 12px", background: T.bg, border: `1px solid ${T.border}`,
            borderRadius: 10, color: T.text, fontSize: 13, outline: "none", boxSizing: "border-box", fontFamily: FONT,
          }} />
        <div style={{ display: "flex", gap: 4, marginTop: 8, flexWrap: "wrap", position: "relative" }}>
          <div onClick={() => setShowCal(!showCal)} style={{
            padding: "4px 10px", borderRadius: 14, fontSize: 11, cursor: "pointer",
            background: dateFilter ? T.accentLight : T.bg, color: dateFilter ? T.accent : T.textSec,
            border: `1px solid ${dateFilter ? T.accent : T.border}`,
          }}>📅 {dateFilter ? fD(dateFilter) : "日期"}</div>
          {Object.entries(CATS).map(([k, v]) => (
            <div key={k} onClick={() => setCatFilter(catFilter === k ? null : k)} style={{
              padding: "4px 8px", borderRadius: 14, fontSize: 11, cursor: "pointer",
              background: catFilter === k ? v.color + "18" : T.bg,
              color: catFilter === k ? v.color : T.textSec,
              border: `1px solid ${catFilter === k ? v.color + "40" : "transparent"}`,
              display: "flex", alignItems: "center", gap: 2,
            }}>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: v.color, flexShrink: 0 }}></span>
              <span>{v.label}</span>
            </div>
          ))}
        </div>
        {showCal && <div style={{ marginTop: 8, position: "relative", zIndex: 100 }}><Calendar selectedDate={dateFilter} onSelect={d => { setDateFilter(d); setShowCal(false); }} conversations={convs} /></div>}
        <div style={{ display: "flex", gap: 0, marginTop: 10, background: T.bg, borderRadius: 10, padding: 2 }}>
          {[
            { key: "chat", label: "对话", icon: "💬" },
            { key: "favs", label: "收藏", icon: "♥" },
            { key: "stats", label: "统计", icon: "📊" },
          ].map(tab => (
            <div key={tab.key} onClick={() => setView(tab.key)} style={{
              flex: 1, textAlign: "center", padding: "6px 0", borderRadius: 8, fontSize: 12, cursor: "pointer",
              background: view === tab.key ? T.surface : "transparent",
              color: view === tab.key ? T.text : T.textTer,
              boxShadow: view === tab.key ? T.shadow : "none", fontWeight: view === tab.key ? 500 : 400,
              transition: "all 0.2s",
            }}>{tab.icon} {tab.label}</div>
          ))}
        </div>
        <div style={{ fontSize: 11, color: T.textTer, marginTop: 8 }}>
          {filtered.length === convs.length ? `共 ${convs.length} 段对话` : `${filtered.length} / ${convs.length}`}
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "0 6px 12px", WebkitOverflowScrolling: "touch" }}>
        {view === "chat" && Object.entries(grouped).map(([month, cs]) => (
          <div key={month}>
            <div style={{ fontSize: 11, color: T.textTer, padding: "12px 8px 4px", position: "sticky", top: 0, background: T.surface, zIndex: 1 }}>{month}</div>
            {cs.map(c => {
              const isSel = sel?.id === c.id;
              const cat = CATS[c.category] || CATS.daily;
              return (
                <div key={c.id} onClick={() => { setSel(c); if (isMobile) setShowSidebar(false); }} style={{
                  padding: "9px 10px", borderRadius: 10, cursor: "pointer", marginBottom: 1,
                  background: isSel ? T.accentLight : "transparent",
                  transition: "all 0.15s",
                }}>
                  <div style={{ fontSize: 13, fontWeight: isSel ? 500 : 400, marginBottom: 3, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", display: "flex", alignItems: "center", gap: 4 }}>
                    <span style={{ width: 6, height: 6, borderRadius: 3, background: cat.color, display: "inline-block", flexShrink: 0 }}></span>
                    <span>{c.title}</span>
                  </div>
                  <div style={{ fontSize: 11, color: T.textTer, display: "flex", gap: 8 }}>
                    <span>{c.createTime ? fD(c.createTime) : ""}</span>
                    <span>{c.messageCount}条</span>
                    <span>{fC(c.totalChars)}</span>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
        {view !== "chat" && <div style={{ padding: 16, fontSize: 12, color: T.textTer, textAlign: "center" }}>← 切换到"对话"标签查看列表</div>}
      </div>
      <div style={{ padding: "10px", borderTop: `1px solid ${T.border}`, display: "flex", gap: 8, flexShrink: 0 }}>
        <div onClick={() => inputRef.current?.click()} style={{
          flex: 1, textAlign: "center", fontSize: 12, color: T.accent, cursor: "pointer",
          padding: "6px 0",
        }}>
          + 导入更多对话
        </div>
        <div onClick={() => {
          if (confirm("确定要清除所有本地数据吗？此操作不可恢复。")) {
            indexedDB.deleteDatabase(DB_NAME);
            setConvs([]); setFavs(new Set()); setSel(null);
          }
        }} style={{
          fontSize: 12, color: T.textTer, cursor: "pointer", padding: "6px 8px",
        }}>
          清除数据
        </div>
      </div>
      <input ref={inputRef} type="file" accept=".json" multiple style={{ display: "none" }}
        onChange={e => { const f = Array.from(e.target.files || []); if (f.length) handleFiles(f); }} />
    </div>
  );

  const main = view === "stats" ? <StatsView conversations={convs} /> :
    view === "favs" ? <FavoritesView conversations={convs} favorites={favs} onToggleFav={toggleFav} onJump={jumpTo} /> :
      <ChatArea conv={sel} favorites={favs} onToggleFav={toggleFav} onFavSelection={handleFavSelection} />;

  return (
    <div style={{ display: "flex", height: "100vh", background: T.bg, fontFamily: FONT, overflow: "hidden" }}>
      {(!isMobile || showSidebar) && sidebar}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", height: "100vh", minWidth: 0 }}>
        {isMobile && !showSidebar && (
          <div onClick={() => setShowSidebar(true)} style={{
            padding: "10px 16px", borderBottom: `1px solid ${T.border}`, background: T.surface,
            display: "flex", alignItems: "center", gap: 8, cursor: "pointer", flexShrink: 0,
          }}>
            <span style={{ fontSize: 16 }}>☰</span>
            <span style={{ fontSize: 14, fontWeight: 500 }}>{sel ? sel.title : "语言巢"}</span>
          </div>
        )}
        {main}
      </div>
      <SelectionTooltip onFavSelection={handleFavSelection} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<EchoVault />);
</script>
</body>
</html>
